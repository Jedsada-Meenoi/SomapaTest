<table class="data-table">
  <thead>
    <tr>
      <th>No.</th>
      <th>First name</th>
      <th>Last name</th>
      <th>Gender</th>
      <th>Date of birth</th>
      <th>Nationality</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let p of passengers; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ p.firstName }}</td>
      <td>{{ p.lastName }}</td>
      <td>{{ p.gender }}</td>
      <td>{{ p.dateOfBirth }}</td>
      <td>{{ p.nationality }}</td>
    </tr>
  </tbody>
</table>
